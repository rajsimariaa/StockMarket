<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Neon Green Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#6ee7b7" />
    </linearGradient>
    
    <!-- Shadow under line -->
    <linearGradient id="area-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>

    <!-- Golden Trophy Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background is kept at full 512x512 size for maskable boundary bleeding -->
  <rect width="512" height="512" fill="url(#bg-grad)" />

  <!-- Inner Safe-Zone Content wrapped inside scaled and translated container (85% size) -->
  <g transform="translate(38.4, 38.4) scale(0.85)">
    <!-- Abstract Grid Lines -->
    <g stroke="#1f2937" stroke-width="1.5" stroke-opacity="0.5">
      <line x1="80" y1="0" x2="80" y2="512" />
      <line x1="160" y1="0" x2="160" y2="512" />
      <line x1="240" y1="0" x2="240" y2="512" />
      <line x1="320" y1="0" x2="320" y2="512" />
      <line x1="400" y1="0" x2="400" y2="512" />
      <line x1="0" y1="80" x2="512" y2="80" />
      <line x1="0" y1="160" x2="512" y2="160" />
      <line x1="0" y1="240" x2="512" y2="240" />
      <line x1="0" y1="320" x2="512" y2="320" />
      <line x1="0" y1="400" x2="512" y2="400" />
    </g>

    <!-- Candlesticks in Background -->
    <!-- Red Bearish Candle -->
    <g opacity="0.15">
      <line x1="120" y1="180" x2="120" y2="300" stroke="#ef4444" stroke-width="3" />
      <rect x="105" y="200" width="30" height="70" rx="4" fill="#ef4444" />
    </g>
    <!-- Green Bullish Candle -->
    <g opacity="0.15">
      <line x1="380" y1="100" x2="380" y2="240" stroke="#10b981" stroke-width="3" />
      <rect x="365" y="120" width="30" height="90" rx="4" fill="#10b981" />
    </g>

    <!-- Glowing Area Under Trend Line -->
    <path d="M 80 400 L 160 340 L 240 370 L 320 220 L 400 250 L 480 120 L 480 440 L 80 440 Z" fill="url(#area-grad)" />

    <!-- Trend Line -->
    <path d="M 80 400 L 160 340 L 240 370 L 320 220 L 400 250 L 480 120" 
          fill="none" stroke="url(#line-grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow)" />

    <!-- Glowing Nodes on Trend Line -->
    <circle cx="160" cy="340" r="7" fill="#ffffff" filter="url(#glow)" />
    <circle cx="320" cy="220" r="7" fill="#ffffff" filter="url(#glow)" />
    <circle cx="480" cy="120" r="9" fill="#ffffff" filter="url(#glow)" />

    <!-- Golden Trophy (SMBG Win State Indicator) -->
    <g transform="translate(216, 75)" filter="url(#glow)">
      <path d="M 40 10 C 40 10 75 10 75 35 C 75 55 55 60 55 70 L 55 80 L 65 80 C 70 80 70 85 70 85 L 10 85 C 10 85 10 80 15 80 L 25 80 L 25 70 C 25 60 5 55 5 35 C 5 10 40 10 40 10 Z" 
            fill="url(#gold-grad)" />
      <path d="M 5 25 C -5 25 -5 45 5 45 M 75 25 C 85 25 85 45 75 45" fill="none" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" />
      <path d="M 40 25 L 43 32 L 50 32 L 45 36 L 47 43 L 40 39 L 33 43 L 35 36 L 30 32 L 37 32 Z" fill="#ffffff" />
    </g>

    <!-- Premium Typography: SMBG Pro -->
    <text x="256" y="465" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="800" font-size="44" fill="#ffffff" letter-spacing="4">
      SMBG <tspan fill="#3b82f6">PRO</tspan>
    </text>
  </g>
</svg>
